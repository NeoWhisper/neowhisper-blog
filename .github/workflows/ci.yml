name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate Content Generator Config
        run: npm run content:check
        env:
          OPENAI_MODEL: google/gemma-4-e4b
          OPENAI_API_MODE: lm-studio
          TREND_POST_COVER_IMAGE: /images/default-cover.png
          TREND_POST_AUTHOR_NAME: NeoWhisper AI
          OPENAI_BASE_URL: http://127.0.0.1:1234/v1
          OPENAI_API_KEY: dummy-key-for-ci
          OLLAMA_BASE_URL: http://127.0.0.1:11434

      - name: Test Content Generator Flags
        run: npm run content:test-flags

      - name: Test Content Safety Guardrails
        run: npm run content:test-safety

      - name: Smoke Test Site URL Wiring
        run: npm run content:test-site-url

      - name: Typecheck Content Scripts
        run: npm run content:typecheck

      - name: Build
        run: npm run build
