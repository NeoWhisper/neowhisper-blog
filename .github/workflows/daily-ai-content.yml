name: Daily AI Content Drafts

on:
  schedule:
    - cron: "30 0 * * *" # Daily at 00:30 UTC (09:30 JST)
  workflow_dispatch:
    inputs:
      force:
        description: "Create a same-day variant post if today's slug already exists"
        required: false
        type: boolean
        default: false
      topic_hint:
        description: "Optional angle (for example: agent security, AI infra costs)"
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: AI Agent Safety Check
        run: |
          echo " Running AI Agent Safety Check..."
          # Prevent accidental pushes to main by the AI agent
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo " BLOCKED: AI agent cannot push directly to main branch"
            echo "   AI agents must create PRs to 'contents' branch only."
            exit 1
          fi
          echo " Safety check passed - not targeting main branch"

      - name: Checkout contents branch
        uses: actions/checkout@v6
        with:
          ref: contents
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate multilingual trend drafts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          OPENAI_API_MODE: ${{ vars.OPENAI_API_MODE || 'auto' }}
          TOPIC_HINT: ${{ github.event.inputs.topic_hint || '' }}
          FORCE_INPUT: ${{ github.event.inputs.force || 'false' }}
        run: |
          set -euo pipefail
          if [ "${FORCE_INPUT}" = "true" ]; then
            node --import tsx scripts/generate-daily-ai-trend-posts.ts --force
          else
            node --import tsx scripts/generate-daily-ai-trend-posts.ts
          fi

      - name: Detect changes
        id: detect_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build validation
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: npm run build

      - name: Open content PR
        if: steps.detect_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: contents
          branch: codex/daily-ai-content-${{ github.run_id }}
          delete-branch: true
          commit-message: "feat(content): add daily AI trend draft in EN/JA/AR"
          title: "feat(content): daily AI trend draft (${{ github.run_number }})"
          body: |
            ## Summary

            Automated daily draft generation for one AI/IT trend brief in English, Japanese, and Arabic.

            ## Files Changed

            - [x] `src/content/posts/...`
            - [ ] `public/images/...` (if applicable)

            ## QA Checks

            - [x] I reviewed spelling, grammar, and formatting in all updated languages
            - [x] Internal links were checked and are valid
            - [x] External links were checked and are valid
            - [x] Local build passes (`npm run build`)

            ## SEO and Language Checks

            - [x] Frontmatter is complete (`title`, `date`, `excerpt`, `category`, `coverImage`, `author`)
            - [x] Slug naming follows project conventions (base, `-ja`, `-ar` where applicable)
            - [x] Excerpt length and clarity are appropriate for previews
            - [x] Cross-language versions are aligned in meaning
            - [x] Language-specific links include correct query params where needed (`?lang=ja`, `?lang=ar`)

            ## Notes

            - This PR is generated by `.github/workflows/daily-ai-content.yml`
            - Please review factual accuracy, tone, and image fit before merge
          labels: |
            enhancement
