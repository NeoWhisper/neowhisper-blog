name: Promote Contents to Main PR

on:
  push:
    branches:
      - contents
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: promote-contents-to-main
  cancel-in-progress: false

jobs:
  ensure-promotion-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure open PR from contents to main
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = "main";
            const head = "contents";
            const headRef = `${owner}:${head}`;

            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              base,
              head: headRef,
              per_page: 100,
            });

            if (existing.length > 0) {
              core.info(`Existing open promotion PR found: #${existing[0].number}`);
              return;
            }

            const comparison = await github.rest.repos.compareCommits({
              owner,
              repo,
              base,
              head,
            });

            if ((comparison.data.ahead_by || 0) === 0) {
              core.info("No commits to promote from contents to main.");
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title: "chore(release): promote contents to main",
              head,
              base,
              body: [
                "## Description",
                "",
                "Automated promotion PR to release the latest changes from `contents` into `main`.",
                "",
                "## Notes",
                "",
                "- Created automatically by `.github/workflows/promote-contents-to-main.yml`.",
                "- This PR will continue to update as new commits are added to `contents`.",
              ].join("\n"),
            });

            core.info(`Created promotion PR: #${created.data.number}`);

            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: created.data.number,
                labels: ["automated", "enhancement"],
              });
            } catch (error) {
              core.warning(`Could not add labels automatically: ${error.message}`);
            }
