name: Promote Dev to Main PR

on:
  workflow_dispatch:
    description: "Create a release PR from dev → main"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: promote-dev-to-main
  cancel-in-progress: false

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create fresh release PR from dev to main
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = "main";
            const head = "dev";
            const headRef = `${owner}:${head}`;

            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              base,
              head: headRef,
              per_page: 100,
            });

            const comparison = await github.rest.repos.compareCommits({
              owner,
              repo,
              base,
              head,
            });

            if ((comparison.data.ahead_by || 0) === 0) {
              core.info("No commits to promote from dev to main.");
              return;
            }

            if ((comparison.data.files || []).length === 0) {
              core.info("No file changes to promote from dev to main.");
              return;
            }

            if (existing.length > 0) {
              core.info(`Existing open release PR found: #${existing[0].number}`);
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title: "chore(release): promote dev to main - one-time snapshot",
              head,
              base,
              body: [
                "## Description",
                "",
                "Automated promotion PR to release the latest changes from `dev` into `main`.",
                "",
                "## Notes",
                "",
                "- Created manually via workflow_dispatch in `.github/workflows/promote-dev-to-main.yml`.",
                "- This is a one-time snapshot; existing open release PRs are left untouched.",
                "- Review and merge when ready to release to production.",
              ].join("\n"),
            });

            core.info(`Created promotion PR: #${created.data.number}`);

            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: created.data.number,
                labels: ["release"],
              });
            } catch (error) {
              core.warning(`Could not add labels automatically: ${error.message}`);
            }
