name: Send Subscriber Updates

on:
  push:
    branches:
      - main
    paths:
      - "src/content/posts/**"
  pull_request_target:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: send-subscriber-updates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send:
    if: >
      github.event_name != 'pull_request_target' ||
      (
        github.event.pull_request.merged == true &&
        (
          github.event.pull_request.head.ref == 'contents' ||
          github.event.pull_request.head.ref == 'dev'
        )
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.merge_commit_sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send localized subscriber emails
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ vars.RESEND_FROM }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://www.neowhisper.net' }}
        run: npm run send:subscribers
