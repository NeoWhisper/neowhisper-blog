name: Sync Main to Dev and Contents

on:
  # DISABLED push trigger: Only allow manual triggering via workflow_dispatch.
  # Automatic back-merge to contents on every main push creates noise.
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backmerge:
    if: github.repository == 'NeoWhisper/neowhisper-blog'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync main into dev and contents when needed
        run: |
          for branch in dev contents; do
            git checkout "$branch" || git checkout -b "$branch" "origin/$branch"

            if git diff --quiet origin/main "$branch"; then
              echo "$branch has no file changes compared with main; skipping sync."
              continue
            fi

            git merge origin/main --no-edit -m "chore(sync): automated merge of main into $branch"
            git push origin "$branch"
          done
        continue-on-error: true
